{% extends "app_base.html" %}

{% block content %}
<div class="app-workspace">
    <div class="flex items-center gap-2 flex-wrap">
        <button class="btn btn-primary btn-sm">All <span class="badge badge-sm ml-1">0</span></button>
        <button class="btn btn-outline btn-sm">Low Confidence <span class="badge badge-sm ml-1">0</span></button>
        <button class="btn btn-outline btn-sm">In Review <span class="badge badge-sm ml-1">0</span></button>
        <button class="btn btn-outline btn-sm">Completed <span class="badge badge-sm ml-1">0</span></button>
    </div>

    <label class="input input-bordered input-sm flex items-center gap-2">
        <svg class="w-4 h-4 text-base-content/40" fill="none" stroke="currentColor" viewBox="0 0 24 24"
            aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input type="search" class="grow" placeholder="Search documents..." />
    </label>

    <section class="app-table-region">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th>Document</th>
                    <th>Type</th>
                    <th>Review Reason</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="4" class="text-center text-base-content/50 py-10">No review items</td>
                </tr>
            </tbody>
        </table>
    </section>
</div>
{% endblock %}
