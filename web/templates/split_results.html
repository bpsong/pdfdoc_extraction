{% extends "app_base.html" %}

{% block content %}
<div class="app-workspace">
    <div class="page-grid grid-cols-1 md:grid-cols-4">
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Files</div>
            <div class="stat-value text-2xl">0</div>
        </div>
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Documents</div>
            <div class="stat-value text-2xl">0</div>
        </div>
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Successful</div>
            <div class="stat-value text-2xl text-success">0</div>
        </div>
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Failed</div>
            <div class="stat-value text-2xl text-error">0</div>
        </div>
    </div>

    <section class="app-table-region">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th>Source File</th>
                    <th>Created Documents</th>
                    <th>Category</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="4" class="text-center text-base-content/50 py-10">No split results</td>
                </tr>
            </tbody>
        </table>
    </section>
</div>
{% endblock %}
