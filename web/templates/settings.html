{% extends "app_base.html" %}

{% block content %}
<div class="app-workspace">
    <section class="card bg-base-100 shadow-sm">
        <div class="card-body">
            <h2 class="font-semibold">Runtime Settings</h2>
            <div class="app-table-region">
                <table class="table table-sm">
                    <tbody>
                        <tr>
                            <th>Application</th>
                            <td>{{ app_name|default('DocFlow AI') }}</td>
                        </tr>
                        <tr>
                            <th>Role</th>
                            <td>{{ user_role|default('operator') }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            {% if is_admin|default(false) %}
            <div class="flex gap-2 flex-wrap">
                <a class="btn btn-outline btn-sm" href="/app/schemas">Schemas</a>
                <a class="btn btn-outline btn-sm" href="/app/settings/validation">Validation</a>
                <a class="btn btn-outline btn-sm" href="/app/admin/pipeline">Pipeline</a>
            </div>
            {% endif %}
        </div>
    </section>
</div>
{% endblock %}
