{% extends "app_base.html" %}

{% block header_actions %}
<button id="schema-create-button" class="btn btn-primary btn-sm" type="button">New Schema</button>
{% endblock %}

{% block content %}
<div id="schema-editor-workspace" class="schema-editor-workspace" data-schema-name="{{ schema_name|default('') }}">
    <section class="admin-panel schema-list-panel">
        <div class="admin-panel-header">
            <div class="admin-panel-heading">
                <h2 class="admin-panel-title">Schemas</h2>
            </div>
            <div class="admin-panel-actions">
                <span id="schema-count" class="badge badge-ghost badge-sm">0</span>
            </div>
        </div>
        <div class="px-3 pt-3">
            <input id="schema-search-input" class="input input-bordered input-sm w-full" type="search" placeholder="Search schemas">
        </div>
        <div id="schema-list" class="schema-list">
            <div class="empty-panel">No schemas</div>
        </div>
    </section>

    <section class="admin-panel schema-detail-panel">
        <div class="admin-panel-header">
            <div class="admin-panel-heading">
                <h2 id="schema-detail-title" class="admin-panel-title">Schema</h2>
                <p id="schema-detail-hash" class="admin-panel-subtitle"></p>
            </div>
            <div class="admin-panel-actions">
                <button id="schema-duplicate-button" class="btn btn-outline btn-sm" type="button" disabled>Duplicate</button>
                <button id="schema-save-button" class="btn btn-primary btn-sm" type="button" disabled>Save</button>
            </div>
        </div>

        <div id="schema-warning" class="alert alert-warning hidden text-sm"></div>
        <div id="schema-error" class="alert alert-error hidden text-sm"></div>
        <p id="schema-action-guidance" class="schema-action-guidance text-xs text-base-content/60" aria-live="polite"></p>
        <p id="schema-field-status" class="schema-field-status" role="status" aria-live="polite"></p>

        <div class="schema-meta-grid">
            <label class="form-control">
                <span class="label-text">Name</span>
                <input id="schema-name-input" class="input input-bordered input-sm" type="text" placeholder="invoice.yaml" />
            </label>
            <label class="form-control">
                <span class="label-text">Title</span>
                <input id="schema-title-input" class="input input-bordered input-sm" type="text" />
            </label>
            <label class="form-control md:col-span-2">
                <span class="label-text">Description</span>
                <input id="schema-description-input" class="input input-bordered input-sm" type="text" />
            </label>
        </div>

        <div class="schema-toolbar">
            <div class="basis-full text-xs text-base-content/60">Add a top-level field. Use nested Add buttons inside object fields for child fields.</div>
            <button class="btn btn-outline btn-xs" type="button" data-add-field="string" title="Add top-level string field">String</button>
            <button class="btn btn-outline btn-xs" type="button" data-add-field="number">Number</button>
            <button class="btn btn-outline btn-xs" type="button" data-add-field="boolean">Boolean</button>
            <button class="btn btn-outline btn-xs" type="button" data-add-field="enum">Enum</button>
            <button class="btn btn-outline btn-xs" type="button" data-add-field="object">Object</button>
            <button class="btn btn-outline btn-xs" type="button" data-add-field="array">Array</button>
        </div>

        <nav id="schema-field-outline" class="schema-field-outline hidden" aria-label="Schema field outline"></nav>

        <div id="schema-field-tree" class="schema-field-tree">
            <div class="empty-panel">No fields</div>
        </div>
    </section>

    <section class="admin-panel schema-preview-panel">
        <div class="admin-panel-header">
            <div class="admin-panel-heading">
                <h2 class="admin-panel-title">YAML Preview</h2>
            </div>
            <div class="admin-panel-actions">
                <button id="schema-validate-button" class="btn btn-outline btn-sm" type="button" disabled>Validate</button>
            </div>
        </div>
        <div id="schema-validation-results" class="schema-validation-results text-sm" role="status" aria-live="polite" tabindex="-1"></div>
        <pre id="schema-yaml-preview" class="schema-yaml-preview"></pre>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/schema_editor.js?v=schema-field-actions" defer></script>
{% endblock %}
