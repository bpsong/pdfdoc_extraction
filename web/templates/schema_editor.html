{% extends "app_base.html" %}

{% block content %}
<div class="app-workspace">
    {% if schema_name is defined and schema_name %}
    <div class="alert bg-base-100 border-base-300">
        <span class="text-sm">Schema {{ schema_name }}</span>
    </div>
    {% endif %}
    <section class="grid grid-cols-1 lg:grid-cols-[18rem_minmax(0,1fr)] gap-4">
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h2 class="font-semibold">Schemas</h2>
                <div class="empty-panel min-h-48">No schemas loaded</div>
            </div>
        </div>
        <div class="card bg-base-100 shadow-sm">
            <div class="card-body">
                <h2 class="font-semibold">Fields</h2>
                <div class="empty-panel">No schema selected</div>
            </div>
        </div>
    </section>
</div>
{% endblock %}
