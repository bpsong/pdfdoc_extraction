{% extends "app_base.html" %}

{% block content %}
<div class="app-workspace">
    <div class="page-grid grid-cols-1 md:grid-cols-3">
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Config Health</div>
            <div class="stat-value text-2xl">Ready</div>
        </div>
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Drafts</div>
            <div class="stat-value text-2xl">0</div>
        </div>
        <div class="stat bg-base-100 rounded-lg shadow-sm metric-card">
            <div class="stat-title">Audit Events</div>
            <div class="stat-value text-2xl">0</div>
        </div>
    </div>
    <section class="app-table-region">
        <table class="table table-sm">
            <thead>
                <tr>
                    <th>Area</th>
                    <th>Status</th>
                    <th>Updated</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td colspan="3" class="text-center text-base-content/50 py-10">No admin activity</td>
                </tr>
            </tbody>
        </table>
    </section>
</div>
{% endblock %}
