{% extends "app_base.html" %}
{% block content %}
<section class="space-y-6" id="user-management">
  <div id="user-message" class="alert hidden"></div>
  <div class="grid gap-6 lg:grid-cols-2">
    {% for account in ['admin', 'operator'] %}
    <form class="card bg-base-100 border border-base-200 shadow-sm user-password-form" data-user="{{ account }}">
      <div class="card-body">
        <h2 class="card-title">{{ account|capitalize }}</h2>
        <label class="form-control"><span class="label-text">Current admin password</span>
          <input name="current_admin_password" type="password" class="input input-bordered" required autocomplete="current-password">
        </label>
        <label class="form-control"><span class="label-text">New password</span>
          <input name="new_password" type="password" class="input input-bordered" required autocomplete="new-password">
        </label>
        <label class="form-control"><span class="label-text">Confirm new password</span>
          <input name="confirmation" type="password" class="input input-bordered" required autocomplete="new-password">
        </label>
        <p class="text-xs text-base-content/60">12–72 UTF-8 bytes with uppercase, lowercase, number, and symbol.</p>
        <button class="btn btn-primary" type="submit">Change {{ account }} password</button>
      </div>
    </form>
    {% endfor %}
  </div>
</section>
<script src="/static/js/admin_users.js"></script>
{% endblock %}
